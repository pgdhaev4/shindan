<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>総合技術監理 過去問アプリ</title>
<style>
:root {
  --primary: #1a3a5c;
  --primary-light: #2a5080;
  --accent: #e8a020;
  --accent-dark: #c07010;
  --bg: #f0f4f8;
  --card: #ffffff;
  --text: #1a2a3a;
  --text-light: #5a7090;
  --border: #d0dce8;
  --correct: #1a7a40;
  --wrong: #c02020;
  --correct-bg: #e8f5ec;
  --wrong-bg: #fdf0f0;
  --radius: 12px;
  --shadow: 0 2px 12px rgba(0,0,0,0.10);
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
  font-family: 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  font-size: 15px;
  line-height: 1.6;
}

/* ─── 共通ヘッダー ─── */
.app-header {
  background: var(--primary);
  color: #fff;
  padding: 14px 16px;
  display: flex;
  align-items: center;
  gap: 10px;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 2px 8px rgba(0,0,0,0.20);
}
.app-header h1 { font-size: 16px; font-weight: 700; flex: 1; }
.btn-home {
  background: rgba(255,255,255,0.15);
  border: none; color: #fff; padding: 6px 12px;
  border-radius: 6px; cursor: pointer; font-size: 13px;
}

/* ─── 画面制御 ─── */
.screen { display: none; }
.screen.active { display: block; }

/* ─── ホーム画面 ─── */
#screen-home { padding: 0 0 80px; }

.home-hero {
  background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
  color: #fff;
  padding: 28px 20px 24px;
  text-align: center;
}
.home-hero .subtitle { font-size: 12px; opacity: .8; margin-bottom: 6px; letter-spacing: .05em; }
.home-hero h2 { font-size: 20px; font-weight: 700; line-height: 1.4; }
.home-hero .desc { font-size: 12px; opacity: .75; margin-top: 8px; }

.section-title {
  font-size: 13px; font-weight: 700; color: var(--text-light);
  letter-spacing: .08em; text-transform: uppercase;
  padding: 20px 16px 8px;
}

/* 年度ボタングリッド */
.year-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
  padding: 0 16px;
}
.year-btn {
  background: var(--card);
  border: 2px solid var(--border);
  border-radius: var(--radius);
  padding: 16px 12px;
  cursor: pointer;
  text-align: center;
  transition: all .18s;
  box-shadow: var(--shadow);
  position: relative;
}
.year-btn:active { transform: scale(.97); background: #eef4ff; }
.year-btn.has-data { border-color: var(--primary); }
.year-btn.no-data { opacity: .5; cursor: not-allowed; }
.year-btn .year-label { font-size: 17px; font-weight: 700; color: var(--primary); display: block; }
.year-btn .year-sub { font-size: 11px; color: var(--text-light); margin-top: 2px; display: block; }
.year-btn .progress-bar {
  height: 4px; background: var(--border); border-radius: 2px;
  margin-top: 8px; overflow: hidden;
}
.year-btn .progress-fill {
  height: 100%; background: var(--accent); border-radius: 2px; transition: width .3s;
}
.year-btn .progress-text { font-size: 11px; color: var(--accent-dark); margin-top: 4px; }

/* 復習ボタン */
.review-section { padding: 16px; }
.review-btn {
  width: 100%;
  background: linear-gradient(135deg, #c02020, #e03030);
  color: #fff; border: none; border-radius: var(--radius);
  padding: 16px; font-size: 15px; font-weight: 700;
  cursor: pointer; box-shadow: var(--shadow);
  display: flex; align-items: center; justify-content: center; gap: 8px;
}
.review-btn:active { opacity: .9; transform: scale(.98); }
.review-count {
  background: rgba(255,255,255,.25);
  border-radius: 20px; padding: 2px 10px; font-size: 13px;
}

/* ─── 問題一覧画面 ─── */
#screen-list { padding-bottom: 80px; }
.list-header {
  background: var(--primary);
  color: #fff; padding: 16px;
}
.list-header h2 { font-size: 17px; font-weight: 700; }
.list-header p { font-size: 12px; opacity: .75; margin-top: 4px; }

.q-list { padding: 12px 16px; display: flex; flex-direction: column; gap: 8px; }
.q-list-item {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px;
  cursor: pointer;
  display: flex; align-items: center; gap: 12px;
  box-shadow: var(--shadow);
  transition: all .15s;
}
.q-list-item:active { background: #eef4ff; }
.q-num {
  width: 36px; height: 36px; border-radius: 50%;
  background: var(--primary); color: #fff;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 700; flex-shrink: 0;
}
.q-num.correct { background: var(--correct); }
.q-num.wrong { background: var(--wrong); }
.q-num.unanswered { background: var(--border); color: var(--text-light); }
.q-info { flex: 1; }
.q-area { font-size: 11px; color: var(--text-light); }
.q-text { font-size: 13px; font-weight: 600; margin-top: 2px; }

/* 設問一覧テーブル（挑戦履歴） */
.qlist-table {
  width: 100%; border-collapse: collapse;
  background: var(--card); border-radius: var(--radius);
  overflow: hidden; box-shadow: var(--shadow); font-size: 12px;
}
.qlist-table th, .qlist-table td {
  padding: 9px 3px; border-bottom: 1px solid var(--border);
  text-align: center;
}
.qlist-table th { background: var(--primary); color: #fff; font-size: 11px; font-weight: 700; }
.qlist-table th.col-attempt, .qlist-table td.col-attempt { width: 26px; }
.qlist-table td.q-cell-info { text-align: left; line-height: 1.35; }
.qlist-table tbody tr { cursor: pointer; }
.qlist-table tbody tr:active { background: #eef4ff; }
.mark-o { color: var(--correct); font-weight: 700; }
.mark-x { color: var(--wrong); font-weight: 700; }
.mark-none { color: var(--border); }

/* 問題文中の表 */
.qtable {
  border-collapse: collapse; width: 100%;
  margin: 10px 0 4px; font-size: 13px;
}
.qtable th, .qtable td {
  border: 1px solid var(--border); padding: 7px 8px; text-align: center;
}
.qtable th { background: var(--primary); color: #fff; font-weight: 700; font-size: 12px; }
.qtable td:first-child, .qtable th:first-child { text-align: left; font-weight: 600; }
.qtable-caption { font-size: 12px; color: var(--text-light); font-weight: 700; margin-top: 6px; }

/* ─── 問題画面 ─── */
#screen-question { padding-bottom: 80px; }
.q-header {
  background: var(--primary);
  color: #fff; padding: 14px 16px;
}
.q-meta {
  display: flex; align-items: center; justify-content: space-between;
  font-size: 12px; opacity: .8;
}
.q-progress { font-size: 13px; font-weight: 700; margin-top: 4px; }

.q-body { padding: 16px; }
.area-badge {
  display: inline-block;
  background: var(--accent);
  color: #fff; font-size: 11px; font-weight: 700;
  padding: 3px 10px; border-radius: 20px; margin-bottom: 12px;
}
.q-sentence {
  font-size: 15px; font-weight: 600; line-height: 1.7;
  background: var(--card); border-radius: var(--radius);
  padding: 16px; border-left: 4px solid var(--primary);
  margin-bottom: 18px; box-shadow: var(--shadow);
}

.choices { display: flex; flex-direction: column; gap: 10px; }
.choice-btn {
  background: var(--card);
  border: 2px solid var(--border);
  border-radius: var(--radius);
  padding: 14px 16px;
  cursor: pointer;
  text-align: left;
  font-size: 14px; line-height: 1.6;
  display: flex; gap: 10px; align-items: flex-start;
  transition: all .15s;
  box-shadow: 0 1px 4px rgba(0,0,0,0.06);
}
.choice-btn:active:not(:disabled) { background: #eef4ff; border-color: var(--primary); }
.choice-btn.selected { border-color: var(--primary); background: #eef4ff; }
.choice-btn.correct { border-color: var(--correct); background: var(--correct-bg); }
.choice-btn.wrong { border-color: var(--wrong); background: var(--wrong-bg); }
.choice-btn:disabled { cursor: default; }
.choice-label {
  width: 26px; height: 26px; border-radius: 50%;
  background: var(--border); color: var(--text-light);
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 700; flex-shrink: 0;
}
.choice-btn.correct .choice-label { background: var(--correct); color: #fff; }
.choice-btn.wrong .choice-label { background: var(--wrong); color: #fff; }
.choice-text { flex: 1; }

/* ─── 解答画面 ─── */
#screen-answer { padding-bottom: 80px; }
.ans-header {
  padding: 16px;
  display: flex; align-items: center; gap: 10px;
}
.result-badge {
  font-size: 16px; font-weight: 700;
  padding: 8px 18px; border-radius: 20px;
}
.result-badge.correct { background: var(--correct-bg); color: var(--correct); }
.result-badge.wrong { background: var(--wrong-bg); color: var(--wrong); }

.ans-body { padding: 0 16px 16px; }


.final-answer {
  background: linear-gradient(135deg, #1a3a5c, #2a5080);
  color: #fff; padding: 14px;
  font-size: 14px; line-height: 1.6;
}
.final-answer .label { font-size: 11px; opacity: .75; margin-bottom: 4px; }
.final-answer .text { font-weight: 700; }

/* AIエージェント討議 */
.agents-section {
  background: var(--card);
  border-radius: var(--radius);
  border: 1px solid var(--border);
  margin-bottom: 14px;
  overflow: hidden;
  box-shadow: var(--shadow);
}
.agents-title {
  background: linear-gradient(135deg, #2d5a8e, #4a7eb5);
  color: #fff; padding: 10px 14px;
  font-size: 13px; font-weight: 700;
  display: flex; align-items: center; gap: 6px;
}
.agent-msg {
  padding: 12px 14px;
  border-bottom: 1px solid var(--border);
  font-size: 13px; line-height: 1.7;
}
.agent-msg:last-child { border-bottom: none; }
.agent-name {
  font-size: 11px; font-weight: 700;
  color: var(--primary-light); margin-bottom: 5px;
  display: flex; align-items: center; gap: 4px;
}
.agent-icon { font-size: 15px; }

/* 回答・解説 */
.answer-section {
  background: var(--card);
  border-radius: var(--radius);
  border: 1px solid var(--border);
  margin-bottom: 14px;
  overflow: hidden;
  box-shadow: var(--shadow);
}
.answer-header {
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  color: #fff; padding: 10px 14px;
  font-size: 13px; font-weight: 700;
}
.answer-body { padding: 14px; }
.answer-body h3 {
  font-size: 14px; font-weight: 700;
  color: var(--primary); margin-bottom: 8px;
  padding-bottom: 6px; border-bottom: 2px solid var(--accent);
}
.answer-body p { font-size: 14px; line-height: 1.75; margin-bottom: 8px; }
.red { color: #c02020; }
.bold { font-weight: 700; }

/* キーワードボタン */
.keyword-section { margin-bottom: 14px; }
.keyword-title { font-size: 12px; color: var(--text-light); margin-bottom: 6px; font-weight: 700; }
.keyword-tags { display: flex; flex-wrap: wrap; gap: 6px; }
.keyword-tag {
  background: var(--primary); color: #fff;
  border: none; border-radius: 20px;
  padding: 6px 14px; font-size: 12px; font-weight: 700;
  cursor: pointer; transition: all .15s;
}
.keyword-tag:active { background: var(--primary-light); transform: scale(.97); }

/* キーワード詳細モーダル */
.modal-overlay {
  display: none;
  position: fixed; inset: 0;
  background: rgba(0,0,0,.5);
  z-index: 200;
  align-items: flex-end;
}
.modal-overlay.open { display: flex; }
.modal-content {
  background: var(--card);
  border-radius: 20px 20px 0 0;
  padding: 20px;
  width: 100%; max-height: 70vh;
  overflow-y: auto;
  animation: slideUp .25s ease;
}
@keyframes slideUp { from { transform: translateY(60px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
.modal-title { font-size: 16px; font-weight: 700; margin-bottom: 12px; color: var(--primary); }
.modal-close {
  float: right; background: none; border: none;
  font-size: 22px; color: var(--text-light); cursor: pointer; margin-top: -4px;
}
.modal-body { font-size: 14px; line-height: 1.8; }

/* ナビゲーションボタン */
.nav-buttons {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: var(--card);
  border-top: 1px solid var(--border);
  padding: 12px 16px;
  display: flex; gap: 10px;
}
.btn-primary {
  flex: 1; background: var(--primary); color: #fff;
  border: none; border-radius: 10px; padding: 14px;
  font-size: 15px; font-weight: 700; cursor: pointer;
}
.btn-primary:active { background: var(--primary-light); }
.btn-secondary {
  flex: 1; background: var(--card); color: var(--primary);
  border: 2px solid var(--primary); border-radius: 10px; padding: 14px;
  font-size: 15px; font-weight: 700; cursor: pointer;
}

/* 結果画面 */
#screen-result { padding: 20px; }
.result-card {
  background: var(--card); border-radius: var(--radius);
  padding: 24px; text-align: center;
  box-shadow: var(--shadow); margin-bottom: 16px;
}
.result-score { font-size: 52px; font-weight: 700; color: var(--primary); }
.result-score span { font-size: 20px; color: var(--text-light); }
.result-detail { font-size: 14px; color: var(--text-light); margin-top: 8px; }
.result-breakdown {
  display: grid; grid-template-columns: repeat(2, 1fr);
  gap: 8px; margin-top: 16px;
}
.breakdown-item {
  background: var(--bg); border-radius: 8px; padding: 10px;
  font-size: 12px; text-align: center;
}
.breakdown-item .val { font-size: 18px; font-weight: 700; color: var(--primary); }
</style>
</head>
<body>

<!-- ── ホーム画面 ── -->
<div id="screen-home" class="screen active">
  <div class="app-header">
    <h1>総監 過去問アプリ</h1>
  </div>
  <div class="home-hero">
    <p class="subtitle">技術士 第二次試験</p>
    <h2>総合技術監理部門<br>択一式 過去問演習</h2>
    <p class="desc">5管理×40問 · スマホ対応</p>
  </div>

  <p class="section-title">過去問を選ぶ</p>
  <div class="year-grid" id="year-grid"></div>

  <div class="review-section">
    <button class="review-btn" onclick="startReview()">
      <span>📝 苦手問題を復習する</span>
      <span class="review-count" id="review-count">0問</span>
    </button>
  </div>
</div>

<!-- ── 問題一覧画面 ── -->
<div id="screen-list" class="screen">
  <div class="app-header">
    <button class="btn-home" onclick="showScreen('home')">← ホーム</button>
    <h1 id="list-title">過去問一覧</h1>
  </div>
  <div class="list-header">
    <h2 id="list-year-title"></h2>
    <p id="list-year-desc"></p>
  </div>
  <div class="q-list" id="q-list"></div>
</div>

<!-- ── 問題画面 ── -->
<div id="screen-question" class="screen">
  <div class="q-header">
    <div class="q-meta">
      <span id="q-year-label"></span>
      <span id="q-num-label"></span>
    </div>
    <div class="q-progress" id="q-progress-label"></div>
  </div>
  <div class="q-body">
    <span class="area-badge" id="q-area-badge"></span>
    <div class="q-sentence" id="q-sentence"></div>
    <div id="q-table"></div>
    <div class="choices" id="q-choices"></div>
  </div>
  <div class="nav-buttons" id="q-nav">
    <button class="btn-secondary" onclick="skipQuestion()">スキップ</button>
  </div>
</div>

<!-- ── 解答画面 ── -->
<div id="screen-answer" class="screen">
  <div class="app-header">
    <button class="btn-home" onclick="showScreen('home')">← ホーム</button>
    <h1>解答・解説</h1>
  </div>
  <div class="ans-header">
    <div class="result-badge" id="ans-result-badge"></div>
    <div style="font-size:13px; color:var(--text-light);"><span id="ans-qnum"></span>　<span id="ans-area"></span></div>
  </div>

  <div class="ans-body">
    <!-- 元の問題文 -->
    <div class="q-sentence" id="ans-qsentence" style="margin-bottom:10px;font-size:14px;"></div>
    <div id="ans-table" style="margin-bottom:14px;"></div>

    <!-- 内部エージェント作業用（非表示） -->
    <div style="display:none">
      <span id="agent1-text"></span>
      <span id="agent2-text"></span>
      <span id="agent3-text"></span>
    </div>

    <!-- 回答 -->
    <div class="answer-section">
      <div class="answer-header">回答</div>
      <div class="final-answer" style="background:linear-gradient(135deg,#1a3a5c,#2a5080);color:#fff;padding:14px;">
        <div style="font-size:11px;opacity:.75;margin-bottom:4px;">正解</div>
        <div style="font-weight:700;font-size:15px;" id="final-answer-text"></div>
      </div>
    </div>

    <!-- 解説 -->
    <div class="answer-section">
      <div class="answer-header">解説</div>
      <div class="answer-body">
        <p id="explain-conclusion" style="display:none"></p>
        <p id="explain-detail"></p>
      </div>
    </div>

    <!-- キーワード連携 -->
    <div class="keyword-section">
      <div class="keyword-title">📌 関連キーワード（タップで詳細を確認）</div>
      <div class="keyword-tags" id="keyword-tags"></div>
    </div>
  </div>

  <div class="nav-buttons">
    <button class="btn-secondary" id="btn-prev-q" onclick="goToPrevQuestion()">← 前の問題</button>
    <button class="btn-primary" id="btn-next-q" onclick="goToNextQuestion()">次の問題 →</button>
  </div>
  <div style="padding:0 16px 16px;">
    <button class="btn-secondary" style="width:100%;" onclick="backToList()">📋 設問一覧へ戻る</button>
  </div>
</div>

<!-- ── 結果画面 ── -->
<div id="screen-result" class="screen">
  <div class="app-header">
    <button class="btn-home" onclick="showScreen('home')">← ホーム</button>
    <h1>演習結果</h1>
  </div>
  <div style="padding: 16px 16px 80px;">
    <div class="result-card">
      <div class="result-score" id="result-score">0<span>/40</span></div>
      <div class="result-detail" id="result-detail"></div>
      <div class="result-breakdown" id="result-breakdown"></div>
    </div>
    <div class="nav-buttons" style="position:static;border:none;padding:0;margin-top:8px;">
      <button class="btn-secondary" onclick="retryYear()">もう一度</button>
      <button class="btn-primary" onclick="showScreen('home')">ホームへ</button>
    </div>
  </div>
</div>

<!-- ── キーワード詳細モーダル ── -->
<div class="modal-overlay" id="keyword-modal" onclick="closeKeywordModal(event)">
  <div class="modal-content">
    <button class="modal-close" onclick="closeKeywordModal()">✕</button>
    <div class="modal-title" id="modal-keyword-title"></div>
    <div class="modal-body" id="modal-keyword-body"></div>
  </div>
</div>

<script src="data/q_r06.js"></script>
<script src="data/keywords.js"></script>
<script>
// ───────────────────────────────────────────────────
// データバンク
const YEAR_DATA = {
  R07: { label: "令和7年度", q: null },
  R06: { label: "令和6年度", q: () => Q_R06 },
  R05: { label: "令和5年度", q: null },
  R04: { label: "令和4年度", q: null },
  R03: { label: "令和3年度", q: null },
  R02: { label: "令和2年度", q: null },
  R01: { label: "令和元年度", q: null },
  H30: { label: "平成30年度", q: null },
  H29: { label: "平成29年度", q: null },
  H28: { label: "平成28年度", q: null },
};

// ───────────────────────────────────────────────────
// ストレージ
const STORAGE_KEY = "sogo_kanri_v1";
function loadData() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; }
  catch { return {}; }
}
function saveData(d) { localStorage.setItem(STORAGE_KEY, JSON.stringify(d)); }
function getYearResults(year) {
  const d = loadData();
  return d[year] || {};  // { qId: [bool, ...] 最大5回 }
}
// 保存値（配列 or 旧bool）から最新結果を取得
function latestResult(v) {
  if (Array.isArray(v)) return v.length ? v[v.length - 1] : undefined;
  return v;  // 旧形式bool または undefined
}
// 挑戦履歴（boolの配列）を取得
function getHistory(year, qId) {
  const v = getYearResults(year)[qId];
  if (Array.isArray(v)) return v;
  if (typeof v === 'boolean') return [v];
  return [];
}
function saveResult(year, qId, correct) {
  const d = loadData();
  if (!d[year]) d[year] = {};
  let cur = d[year][qId];
  if (typeof cur === 'boolean') cur = [cur];       // 旧形式を配列化
  if (!Array.isArray(cur)) cur = [];
  cur.push(!!correct);
  if (cur.length > 5) cur = cur.slice(cur.length - 5);  // 直近5回のみ保持
  d[year][qId] = cur;
  saveData(d);
}
function getWrongQuestions() {
  const d = loadData();
  const wrongs = [];
  for (const [year, results] of Object.entries(d)) {
    const qs = YEAR_DATA[year]?.q?.();
    if (!qs) continue;
    for (const [qId, val] of Object.entries(results)) {
      if (!latestResult(val)) {
        const q = qs.find(x => String(x.id) === String(qId));
        if (q) wrongs.push({ ...q, year });
      }
    }
  }
  return wrongs;
}

// ───────────────────────────────────────────────────
// セッション状態
let session = {
  questions: [],
  currentIdx: 0,
  yearKey: "",
  isReview: false,
};

// ───────────────────────────────────────────────────
// 画面制御
function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + name).classList.add('active');
  window.scrollTo(0, 0);
  if (name === 'home') renderHome();
}

// ───────────────────────────────────────────────────
// ホーム画面
function renderHome() {
  const grid = document.getElementById('year-grid');
  grid.innerHTML = '';
  for (const [key, info] of Object.entries(YEAR_DATA)) {
    const hasData = !!info.q;
    const btn = document.createElement('div');
    btn.className = 'year-btn ' + (hasData ? 'has-data' : 'no-data');

    const results = getYearResults(key);
    const answered = Object.keys(results).length;
    const correct  = Object.values(results).filter(v => latestResult(v) === true).length;
    const total    = hasData ? (YEAR_DATA[key].q()?.length || 40) : 40;
    const pct      = total > 0 ? Math.round(answered / total * 100) : 0;

    btn.innerHTML = `
      <span class="year-label">${info.label}</span>
      <span class="year-sub">${hasData ? '40問' : '準備中'}</span>
      ${hasData ? `
        <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
        <div class="progress-text">${answered > 0 ? `${correct}/${answered}問 正解` : '未着手'}</div>
      ` : ''}
    `;
    if (hasData) btn.onclick = () => showYearList(key);
    grid.appendChild(btn);
  }

  const wrongs = getWrongQuestions();
  document.getElementById('review-count').textContent = wrongs.length + '問';
}

// ───────────────────────────────────────────────────
// 問題一覧
function showYearList(yearKey) {
  const info = YEAR_DATA[yearKey];
  const qs   = info.q();
  const results = getYearResults(yearKey);

  document.getElementById('list-title').textContent = info.label;
  document.getElementById('list-year-title').textContent = info.label + ' 択一式（40問）';
  document.getElementById('list-year-desc').textContent = '問題をタップして演習を開始';

  const list = document.getElementById('q-list');
  list.innerHTML = '';

  // 全問一括スタートボタン
  const startBtn = document.createElement('button');
  startBtn.className = 'btn-primary';
  startBtn.style.cssText = 'margin-bottom:8px;padding:14px;border-radius:10px;';
  startBtn.textContent = '▶ 第1問から順番に解く';
  startBtn.onclick = () => startYear(yearKey, 0);
  list.appendChild(startBtn);

  // 設問一覧テーブル（番号＋1〜5回目の正誤）
  const table = document.createElement('table');
  table.className = 'qlist-table';
  table.innerHTML = `
    <thead><tr>
      <th>No</th><th style="text-align:left;">設問</th>
      <th class="col-attempt">1</th><th class="col-attempt">2</th>
      <th class="col-attempt">3</th><th class="col-attempt">4</th>
      <th class="col-attempt">5</th>
    </tr></thead>`;
  const tbody = document.createElement('tbody');
  qs.forEach((q, i) => {
    const hist = getHistory(yearKey, q.id);
    let cells = '';
    for (let k = 0; k < 5; k++) {
      const v = hist[k];
      const mark = v === true ? '<span class="mark-o">〇</span>'
                 : v === false ? '<span class="mark-x">×</span>'
                 : '<span class="mark-none">–</span>';
      cells += `<td class="col-attempt">${mark}</td>`;
    }
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td>${i + 1}</td>
      <td class="q-cell-info">
        <span style="font-weight:700;">${q.qnum || ('問' + q.id)}</span><br>
        <span style="color:var(--text-light);font-size:10px;">${q.area}</span>
      </td>${cells}`;
    tr.onclick = () => startYear(yearKey, i);
    tbody.appendChild(tr);
  });
  table.appendChild(tbody);
  list.appendChild(table);

  showScreen('list');
}

// ───────────────────────────────────────────────────
// 演習開始
function startYear(yearKey, startIdx) {
  const qs = YEAR_DATA[yearKey].q();
  session = { questions: qs, currentIdx: startIdx, yearKey, isReview: false };
  showQuestion(startIdx);
}
function startReview() {
  const wrongs = getWrongQuestions();
  if (wrongs.length === 0) { alert('まだ間違えた問題がありません。'); return; }
  session = { questions: wrongs, currentIdx: 0, yearKey: 'review', isReview: true };
  showQuestion(0);
}
function retryYear() {
  if (session.isReview) startReview();
  else startYear(session.yearKey, 0);
}

// テキストをHTMLエスケープして改行を<br>に変換
function renderText(text) {
  if (text == null) return '';
  return String(text)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/\n/g, '<br>');
}

// 問題文中の表をHTMLに変換
function renderTable(t) {
  if (!t || !t.rows || !t.rows.length) return '';
  let html = '';
  if (t.caption) html += `<div class="qtable-caption">表：${renderText(t.caption)}</div>`;
  html += '<table class="qtable">';
  t.rows.forEach((row, r) => {
    html += '<tr>';
    row.forEach(cell => {
      const tag = r === 0 ? 'th' : 'td';
      html += `<${tag}>${renderText(cell)}</${tag}>`;
    });
    html += '</tr>';
  });
  html += '</table>';
  return html;
}

// 解答画面から設問一覧へ戻る
function backToList() {
  if (session.yearKey && YEAR_DATA[session.yearKey]?.q) showYearList(session.yearKey);
  else showScreen('home');
}

// ───────────────────────────────────────────────────
// 問題表示
function showQuestion(idx) {
  const q = session.questions[idx];
  if (!q) { showResult(); return; }

  document.getElementById('q-year-label').textContent = YEAR_DATA[session.yearKey]?.label || '復習モード';
  document.getElementById('q-num-label').textContent = q.qnum || `問${q.id}`;
  document.getElementById('q-progress-label').textContent = `${idx + 1} / ${session.questions.length}問`;
  document.getElementById('q-area-badge').textContent = q.area;
  document.getElementById('q-sentence').innerHTML = renderText(q.q);
  document.getElementById('q-table').innerHTML = q.table ? renderTable(q.table) : '';

  const choicesEl = document.getElementById('q-choices');
  choicesEl.innerHTML = '';
  q.choices.forEach((c, i) => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.innerHTML = `<span class="choice-label">${i + 1}</span><span class="choice-text">${c}</span>`;
    btn.onclick = () => answerQuestion(i, q);
    choicesEl.appendChild(btn);
  });

  document.getElementById('q-nav').innerHTML = `
    <button class="btn-secondary" onclick="skipQuestion()">スキップ</button>
  `;
  showScreen('question');
}

function answerQuestion(choiceIdx, q) {
  const correct = choiceIdx === q.answer;
  saveResult(q.year || session.yearKey, q.id, correct);

  // 選択肢のビジュアル更新
  const btns = document.querySelectorAll('.choice-btn');
  btns.forEach((btn, i) => {
    btn.disabled = true;
    if (i === q.answer) btn.classList.add('correct');
    else if (i === choiceIdx && !correct) btn.classList.add('wrong');
  });

  // 解答ボタン表示
  setTimeout(() => showAnswer(q, choiceIdx, correct), 400);
}

function skipQuestion() {
  session.currentIdx++;
  if (session.currentIdx >= session.questions.length) showResult();
  else showQuestion(session.currentIdx);
}

// ───────────────────────────────────────────────────
// 解答画面
function showAnswer(q, choiceIdx, correct) {
  const badge = document.getElementById('ans-result-badge');
  badge.textContent = correct ? '⭕ 正解！' : '❌ 不正解';
  badge.className = 'result-badge ' + (correct ? 'correct' : 'wrong');

  document.getElementById('ans-qnum').textContent = q.qnum || q.id;
  document.getElementById('ans-area').textContent = q.area;
  document.getElementById('ans-qsentence').innerHTML = renderText(q.q);
  document.getElementById('ans-table').innerHTML = q.table ? renderTable(q.table) : '';

  // AIエージェント3者討議を生成
  const hasAnswer = q.answer >= 0;
  const correctChoice = hasAnswer ? q.choices[q.answer] : '―';
  const correctNum   = hasAnswer ? q.answer + 1 : '?';
  const wrongChoices = q.choices.filter((_, i) => i !== q.answer);

  // Agent1: 法令・規程エキスパート（定義・基準の観点）
  const agent1 = hasAnswer
    ? `各選択肢の定義を精査します。「${correctChoice}」の記述が最も正確です。` +
      (wrongChoices[0] ? `「${wrongChoices[0]}」は定義上の誤りが含まれます。` : '') +
      (wrongChoices[1] ? `「${wrongChoices[1]}」も同様に不適切です。` : '') +
      `総合技術監理の観点からも、選択肢${correctNum}が唯一正確な記述です。`
    : '正解データ未登録';

  // Agent2: 出題傾向アナリスト（過去問パターンの観点）
  const areaLabel = q.area || '総合技術監理';
  const agent2 = hasAnswer
    ? `本問は「${areaLabel}」分野の典型的な出題パターンです。` +
      `過去問の傾向から見ると、この種の問題では各選択肢の細部の違いに注目することが重要です。` +
      `正解は選択肢${correctNum}で、出題頻度の高いキーワードを含んでいます。`
    : '正解データ未登録';

  // Agent3: 技術理論専門家（5管理の体系的観点）
  const detail  = (q.explanation && q.explanation.detail) || '';
  const agent3  = hasAnswer
    ? `5つの管理技術（経済性・人的資源・情報・安全・社会環境）の体系で分類すると、` +
      `本問は${areaLabel}に位置づけられます。` +
      (detail ? `${detail.slice(0, 80)}…` : '') +
      `よって正解は選択肢${correctNum}です。`
    : '正解データ未登録';

  document.getElementById('agent1-text').textContent = agent1;
  document.getElementById('agent2-text').textContent = agent2;
  document.getElementById('agent3-text').textContent = agent3;

  // 正解表示
  const correctLabel = hasAnswer
    ? `選択肢${correctNum}　${correctChoice}`
    : '正解データ未登録';
  document.getElementById('final-answer-text').textContent = correctLabel;

  // 解説
  document.getElementById('explain-conclusion').innerHTML = q.explanation.conclusion;
  document.getElementById('explain-detail').innerHTML = q.explanation.detail;

  // キーワードタグ
  const tagsEl = document.getElementById('keyword-tags');
  tagsEl.innerHTML = '';
  (q.explanation.keywords || []).forEach(kw => {
    const tag = document.createElement('button');
    tag.className = 'keyword-tag';
    tag.textContent = kw;
    tag.onclick = () => showKeyword(kw);
    tagsEl.appendChild(tag);
  });

  // ナビボタン
  const idx = session.currentIdx;
  document.getElementById('btn-prev-q').style.display = idx > 0 ? '' : 'none';
  document.getElementById('btn-next-q').textContent =
    idx + 1 < session.questions.length ? '次の問題 →' : '結果を見る';

  showScreen('answer');
}

function goToNextQuestion() {
  session.currentIdx++;
  if (session.currentIdx >= session.questions.length) showResult();
  else showQuestion(session.currentIdx);
}
function goToPrevQuestion() {
  if (session.currentIdx > 0) {
    session.currentIdx--;
    showQuestion(session.currentIdx);
  }
}

// ───────────────────────────────────────────────────
// 結果画面
function showResult() {
  const results = getYearResults(session.yearKey);
  const total   = session.questions.length;
  const answered = Object.keys(results).length;
  const correct  = Object.values(results).filter(v => latestResult(v) === true).length;

  document.getElementById('result-score').innerHTML = `${correct}<span>/${total}</span>`;
  document.getElementById('result-detail').textContent =
    `正答率 ${Math.round(correct / total * 100)}%　（${answered}問回答済み）`;

  // 管理分野別集計
  const areas = {};
  session.questions.forEach(q => {
    if (!areas[q.area]) areas[q.area] = { total: 0, correct: 0 };
    areas[q.area].total++;
    if (latestResult(results[q.id])) areas[q.area].correct++;
  });

  const bd = document.getElementById('result-breakdown');
  bd.innerHTML = Object.entries(areas).map(([area, stat]) => `
    <div class="breakdown-item">
      <div class="val">${stat.correct}/${stat.total}</div>
      <div>${area}</div>
    </div>
  `).join('');

  showScreen('result');
}

// ───────────────────────────────────────────────────
// キーワードモーダル
function showKeyword(kw) {
  const modal = document.getElementById('keyword-modal');
  document.getElementById('modal-keyword-title').textContent = kw;
  const desc = KEYWORDS[kw] || `「${kw}」に関するキーワード解説は準備中です。\n\nキーワード集PDF（総合技術管理キーワード集 解説2025）をご参照ください。`;
  document.getElementById('modal-keyword-body').innerHTML = desc.replace(/\n/g, '<br>');
  modal.classList.add('open');
}
function closeKeywordModal(e) {
  if (!e || e.target === document.getElementById('keyword-modal')) {
    document.getElementById('keyword-modal').classList.remove('open');
  }
}

// ───────────────────────────────────────────────────
// 初期化
renderHome();
</script>
