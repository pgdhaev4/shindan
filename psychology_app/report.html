const AXIS_ORDER = ['passion', 'devote', 'recover', 'express'];

function axisLevel(axisKey) {
  const axis = window.REPORT_AXES[axisKey];
  let score = 0;
  axis.sources.forEach(src => {
    const key = localStorage.getItem(src.storage) || '';
    if (key.charAt(src.pos) === src.char) score += src.pt;
  });
  return score >= axis.threshold ? 'H' : 'L';
}

function renderLockScreen(remaining) {
  const dots = QUIZZES.map(q =>
    `<div class="p-dot ${localStorage.getItem(q.storage) ? 'done' : ''}">${q.emoji}</div>`
  ).join('');
  const links = QUIZZES.map(q => localStorage.getItem(q.storage)
    ? `<span class="done-label">✅ ${q.name}（診断済み）</span>`
    : `<a href="${q.href}" class="remaining-link">${q.emoji} ${q.name}を受ける</a>`
  ).join('');
  document.getElementById('app').innerHTML = `
    <div class="lock-screen">
      <div class="lock-emoji">🔮</div>
      <h2>あなただけの恋愛性格分析レポート</h2>

}

function renderReport(typeKey, t, names) {
  const axisOrder = ['情熱度', '献身度', '自立回復力', '表現力'];
  const colors = ['#f43f5e', '#ec4899', '#8b5cf6', '#f59e0b'];

    <div class="axis-row">
      <span class="axis-label">${label}</span>
      <div class="axis-bar-wrap"><div class="axis-bar-fill" style="width:${t.bars[label]}%;background:${colors[i]};"></div></div>
      <span class="axis-value">${t.bars[label]}</span>
    </div>`).join('');

  const badgesHtml = QUIZZES.map(q => {
    const n = names[q.storage];
    return n ? `<span class="badge">${q.emoji} ${n}</span>` : '';
  }).join('');

  const strengthsHtml = t.strengths.map(s =>
    `<div class="strength-item"><span class="strength-name">${s.t}</span><span class="strength-desc">${s.d}</span></div>`).join('');

  const viewsHtml = [
    ['💘 恋人・好きな人から見たあなた', t.views.lover],
    ['🍻 友達から見たあなた', t.views.friend],
    ['🏠 家族から見たあなた', t.views.family],
    ['🏢 職場で見せるあなた', t.views.work],
  ].map(([label, text]) => `<div class="view-item"><p class="view-label">${label}</p><p class="view-text">${text}</p></div>`).join('');

  const envHtml = t.env.map(e => `<span class="env-tag">${e}</span>`).join('');
  // 無料版は冒頭だけ見せて完全版へ（フリーミアム設計・workplace版と統一）
  const talentTeaser = t.talent.split('。')[0] + '。';
  const msgTeaser = t.message.split('。').slice(0, 2).join('。') + '。';

  const tweetText = encodeURIComponent(`【私の恋愛タイプ：${t.name}】\n4つの恋愛沼診断を統合分析した結果…\n"${t.catch}"\n\nあなたは16系統のどのタイプ？\n#恋愛沼診断 #恋愛心理テスト`);
  const currentURL = encodeURIComponent(window.location.href);

  document.getElementById('app').innerHTML = `
    <div class="report-hero">
      <span class="label">🔮 統合分析レポート｜16系統</span>
      <h1>4つの診断からわかった、あなたの恋愛タイプは…</h1>

      <p class="type-catch">${t.catch}</p>
      <div class="result-badges">${badgesHtml}</div>
    </div>

    <div class="axes-section">

      <p>${t.essence}</p>
    </div>

    <div class="section-card">
      <h2>💪 あなたの恋愛の強み</h2>
      ${strengthsHtml}
    </div>

    <div class="section-card">
      <h2>👁️ 周囲から見たあなた</h2>
      ${viewsHtml}
    </div>

    <div class="section-card talent-card">
      <h2>💎 実はあなたが気づいていない才能</h2>
      <p>${talentTeaser}</p>
      <p class="teaser-more">🔒 この才能の正体と活かし方は、完全版に収録しています。</p>
    </div>

    <div class="section-card">
      <h2>🌱 あなたに合う恋愛・相手</h2>
      <div class="env-tags">${envHtml}</div>
      <p class="teaser-more">🔒 「こういう相手をどう見つけるか」は、完全版・第2章で。</p>
    </div>

    <div class="message-card">
      <h2>💌 最後に、あなたへ</h2>
      <p>${msgTeaser}</p>
      <p style="font-size:.8em;color:#d9d2e6;margin-top:10px;">――この手紙の続きは、完全版の最終章に。</p>
    </div>

    ${NOTE_URLS[typeKey] ? `
    <div class="premium-card">
      <h2>🔒 この先は、完全版に収録しています</h2>
      <p class="premium-lead">ここまでが「あなたを知る」無料レポート。<br>ここから先は、その愛し方を<strong>恋で使いこなす実践編</strong>です。</p>
      <ul class="locked-list">
        <li>🔒 あなたが気づいていない才能（全文）</li>
        <li>🔒 ストレスを感じやすい恋愛と、心の守り方</li>
        <li>🔒 あなたがもっと輝く方法（30日アクションプラン）</li>

}

(function () {

  QUIZZES.forEach(q => { if (localStorage.getItem(q.storage)) done++; });
  if (done < QUIZZES.length) {
    renderLockScreen(QUIZZES.length - done);
    return;
  }

  const typeKey = AXIS_ORDER.map(axisLevel).join('');
  const t = window.REPORT_TYPES[typeKey];
  if (!t) {
    document.getElementById('app').innerHTML = '<div class="lock-screen"><p>データの読み込みに失敗しました。もう一度診断を受けてみてください。</p></div>';

  const names = {};
  QUIZZES.forEach(q => { names[q.storage] = localStorage.getItem(q.storage + '_name') || ''; });

  renderReport(typeKey, t, names);
