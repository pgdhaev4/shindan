<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>あなただけの性格分析レポート | 会社モンスター診断</title>
  <meta name="description" content="4つの診断結果を統合分析。16系統からあなたの本当の強みと才能を発見する、自己肯定感が上がる性格分析レポート。">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif; background: #101c30; color: #1e293b; min-height: 100vh; }
    .page-wrapper { max-width: 520px; margin: 0 auto; background: #f7f9fc; min-height: 100vh; }
    .site-header { background: #101c30; padding: 12px 16px; }
    .site-header a { color: #94a3b8; text-decoration: none; font-size: .85em; }

    /* ヒーロー */
    .report-hero { background: linear-gradient(135deg, #14284a 0%, #1e3a6d 55%, #3b2f7e 100%); padding: 34px 16px 26px; text-align: center; color: #fff; }
    .report-hero .label { font-size: .72em; background: rgba(251,191,36,.18); border: 1px solid rgba(251,191,36,.5); display: inline-block; padding: 3px 14px; border-radius: 50px; margin-bottom: 14px; color: #fde68a; letter-spacing: .08em; }
    .report-hero h1 { font-size: 1.02em; opacity: .85; font-weight: normal; }
    .type-name { font-size: 1.75em; font-weight: 900; line-height: 1.3; margin: 10px 0 10px; color: #fbbf24; text-shadow: 0 0 24px rgba(251,191,36,.45); }
    .type-catch { font-size: .88em; opacity: .85; line-height: 1.7; }
    .result-badges { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; margin-top: 18px; }
    .badge { font-size: .72em; background: rgba(255,255,255,.12); padding: 4px 12px; border-radius: 50px; color: #e2e8f0; }

    /* 4軸バー */
    .axes-section { background: #182742; padding: 18px 16px 20px; }
    .axes-title { color: #94a3b8; font-size: .75em; letter-spacing: .12em; margin-bottom: 12px; text-align: center; }
    .axis-row { display: flex; align-items: center; gap: 10px; margin-bottom: 9px; }
    .axis-label { color: #cbd5e1; font-size: .76em; width: 84px; flex-shrink: 0; }
    .axis-bar-wrap { flex: 1; background: rgba(255,255,255,.1); border-radius: 50px; height: 9px; overflow: hidden; }
    .axis-bar-fill { border-radius: 50px; height: 100%; transition: width 1.2s ease; }
    .axis-value { color: #fbbf24; font-size: .72em; width: 30px; flex-shrink: 0; text-align: right; }

    /* カード */
    .section-card { background: #fff; margin: 14px 12px; border-radius: 16px; padding: 18px 16px; box-shadow: 0 2px 10px rgba(16,28,48,.07); }
    .section-card h2 { font-size: .92em; font-weight: bold; margin-bottom: 12px; display: flex; align-items: center; gap: 7px; color: #14284a; }
    .section-card p { font-size: .89em; line-height: 1.9; color: #374151; }

    /* 強み */
    .strength-item { display: flex; gap: 10px; padding: 9px 0; border-bottom: 1px dashed #e2e8f0; align-items: flex-start; }
    .strength-item:last-child { border-bottom: none; }
    .strength-name { flex-shrink: 0; font-size: .8em; font-weight: bold; background: linear-gradient(135deg,#fbbf24,#f59e0b); color: #fff; padding: 4px 12px; border-radius: 50px; min-width: 84px; text-align: center; }
    .strength-desc { font-size: .84em; color: #475569; line-height: 1.7; }

    /* 4視点 */
    .view-item { background: #f1f5f9; border-radius: 12px; padding: 11px 13px; margin-bottom: 8px; }
    .view-label { font-size: .74em; color: #64748b; font-weight: bold; margin-bottom: 3px; }
    .view-text { font-size: .85em; color: #1e293b; line-height: 1.7; }

    /* 才能 */
    .talent-card { background: linear-gradient(135deg, #fffbeb, #fef3c7); border: 1px solid #fde68a; }
    .talent-card h2 { color: #92400e; }
    .talent-card p { color: #78350f; }

    /* 環境タグ */
    .env-tags { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 10px; }
    .env-tag { font-size: .8em; padding: 6px 13px; border-radius: 50px; background: #e0f2fe; color: #075985; font-weight: bold; }
    .env-note { font-size: .82em; color: #64748b; line-height: 1.7; }

    /* 輝く方法 */
    .shine-item { display: flex; gap: 9px; padding: 8px 0; border-bottom: 1px solid #f1f5f9; font-size: .86em; color: #374151; line-height: 1.7; }
    .shine-item:last-child { border-bottom: none; }
    .shine-num { flex-shrink: 0; font-weight: 900; color: #f59e0b; }

    /* 最後のメッセージ */
    .message-card { background: linear-gradient(135deg, #14284a, #3b2f7e); color: #fff; margin: 14px 12px 18px; border-radius: 16px; padding: 22px 18px; }
    .message-card h2 { font-size: .92em; margin-bottom: 12px; color: #fde68a; display: flex; align-items: center; gap: 7px; }
    .message-card p { font-size: .9em; line-height: 2.0; color: #f1f5f9; }

    /* 完全版CTA（note） */
    .premium-card { background: linear-gradient(135deg, #fffbeb, #fef3c7); border: 2px solid #fbbf24; margin: 14px 12px; border-radius: 16px; padding: 22px 18px; }
    .premium-card h2 { font-size: .95em; color: #92400e; margin-bottom: 10px; text-align: center; }
    .premium-lead { font-size: .86em; color: #78350f; line-height: 1.9; margin-bottom: 10px; }
    .premium-list { list-style: none; margin-bottom: 16px; }
    .premium-list li { font-size: .85em; color: #78350f; line-height: 1.9; padding-left: 1.3em; text-indent: -1.3em; }
    .premium-btn { display: block; background: linear-gradient(135deg, #f59e0b, #d97706); color: #fff; font-weight: bold; padding: 14px 18px; border-radius: 50px; text-decoration: none; font-size: .95em; text-align: center; box-shadow: 0 4px 12px rgba(245,158,11,.4); }
    .premium-note { font-size: .72em; color: #a16207; margin-top: 10px; text-align: center; line-height: 1.7; }

    /* シェア */
    .share-section { text-align: center; padding: 6px 16px 10px; }
    .share-lead { font-size: .85em; color: #475569; margin-bottom: 10px; font-weight: bold; }
    .share-btns { display: flex; gap: 10px; justify-content: center; }
    .share-btn { flex: 1; max-width: 200px; padding: 12px 10px; border-radius: 50px; text-decoration: none; font-size: .88em; font-weight: bold; text-align: center; }
    .share-btn.twitter { background: #0f1419; color: #fff; }
    .share-btn.line { background: #06c755; color: #fff; }

    /* ロック画面 */
    .lock-screen { padding: 44px 20px; text-align: center; }
    .lock-emoji { font-size: 3em; }
    .lock-screen h2 { font-size: 1.15em; margin: 16px 0 10px; color: #14284a; line-height: 1.5; }
    .lock-screen p { font-size: .86em; color: #64748b; margin-bottom: 20px; line-height: 1.8; }
    .progress-dots { display: flex; gap: 8px; justify-content: center; margin-bottom: 22px; }
    .p-dot { width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.15em; background: #e2e8f0; }
    .p-dot.done { background: linear-gradient(135deg,#fbbf24,#f59e0b); box-shadow: 0 2px 8px rgba(245,158,11,.4); }
    .remaining-list { display: flex; flex-direction: column; gap: 9px; max-width: 320px; margin: 0 auto 20px; }
    .remaining-link { background: #14284a; color: #fff; padding: 12px 16px; border-radius: 50px; text-decoration: none; font-size: .88em; font-weight: bold; }
    .done-label { background: #f1f5f9; color: #94a3b8; padding: 12px 16px; border-radius: 50px; font-size: .88em; font-weight: bold; }
    .back-link { font-size: .82em; color: #64748b; text-decoration: underline; }

    .disclaimer { text-align: center; font-size: .72em; color: #94a3b8; padding: 14px 16px 4px; }
    .footer-copy { text-align: center; font-size: .72em; color: #94a3b8; padding: 8px 0 24px; }
  </style>
</head>
<body>
<div class="page-wrapper">
  <header class="site-header">
    <a href="index.html">← 会社モンスター診断トップへ</a>
  </header>

  <div id="app"></div>

  <div class="disclaimer">※ これはエンタメ目的の性格分析です。医療・専門診断ではありません。</div>
  <p class="footer-copy">© 2026 診断の森</p>
</div>

<script src="data/report_16types.js"></script>
<script>
// ═══════════════════════════════════════════
//  会社モンスター診断 統合分析レポート
//  4診断（各8タイプ）→ 4軸 → 16系統
// ═══════════════════════════════════════════
const QUIZZES = [
  { axis: 'energy', storage: 'wp_salaryman', href: 'salaryman.html', emoji: '⛓️', name: 'モンスター度診断' },
  { axis: 'lead',   storage: 'wp_boss',      href: 'boss.html',      emoji: '👔', name: '上司適性診断' },
  { axis: 'tough',  storage: 'wp_stress',    href: 'stress.html',    emoji: '🛡️', name: '職場ストレス耐性診断' },
  { axis: 'social', storage: 'wp_secret',    href: 'secret.html',    emoji: '🕵️', name: '会社での裏評価診断' },
];

// 16タイプ → note完全版『頑張りすぎる人のための人生攻略レポート』（各300円）
const NOTE_URLS = {
  HHHH: 'https://note.com/pure_ferret3539/n/n5ad738d1d3f1', // 不屈の太陽王
  HHHL: 'https://note.com/pure_ferret3539/n/n1be8705ea55a', // 孤高の開拓王
  HHLH: 'https://note.com/pure_ferret3539/n/n5f592c3b1428', // 情熱のカリスマ隊長
  HHLL: 'https://note.com/pure_ferret3539/n/n0cf891d13927', // 優しき革命家
  HLHH: 'https://note.com/pure_ferret3539/n/nd8525d58638a', // 現場の守護神
  HLHL: 'https://note.com/pure_ferret3539/n/n438e674b74ef', // 匠の努力王
  HLLH: 'https://note.com/pure_ferret3539/n/nfb98792f988f', // 共感の応援団長
  HLLL: 'https://note.com/pure_ferret3539/n/n646eda71ada1', // 静かなる努力の天才
  LHHH: 'https://note.com/pure_ferret3539/n/ne37276b7a9c4', // 余裕の智将
  LHHL: 'https://note.com/pure_ferret3539/n/n2037713fc270', // 冷静なる戦略家
  LHLH: 'https://note.com/pure_ferret3539/n/n942535067316', // 心をつなぐ調律師
  LHLL: 'https://note.com/pure_ferret3539/n/n9db56ddd0a44', // 思慮深き参謀
  LLHH: 'https://note.com/pure_ferret3539/n/nf1963a286be2', // 癒しの安定神
  LLHL: 'https://note.com/pure_ferret3539/n/na08e6ff6c750', // 動じない賢者
  LLLH: 'https://note.com/pure_ferret3539/n/na6cb579d0fea', // 場を照らす妖精
  LLLL: 'https://note.com/pure_ferret3539/n/n0650bdf6f6fe', // 感性の静かな芸術家
};

function axisLevel(axisKey, resultKey) {
  const axis = window.REPORT_AXES[axisKey];
  const score = axis.scores[resultKey] || 2;
  return score >= 3 ? 'H' : 'L';
}

function renderLockScreen(done, remaining) {
  const dots = QUIZZES.map(q =>
    `<div class="p-dot ${localStorage.getItem(q.storage) ? 'done' : ''}">${q.emoji}</div>`
  ).join('');
  const links = QUIZZES.map(q => localStorage.getItem(q.storage)
    ? `<span class="done-label">✅ ${q.name}（診断済み）</span>`
    : `<a href="${q.href}" class="remaining-link">${q.emoji} ${q.name}を受ける</a>`
  ).join('');
  document.getElementById('app').innerHTML = `
    <div class="lock-screen">
      <div class="lock-emoji">🔮</div>
      <h2>あなただけの性格分析レポート</h2>
      <p>4つの診断をすべて受けると、結果を統合分析して<br><strong>16系統</strong>からあなたの<strong>本当の強みと才能</strong>を導き出します。<br>（あと<strong>${remaining}個</strong>で解放！）</p>
      <div class="progress-dots">${dots}</div>
      <div class="remaining-list">${links}</div>
      <a href="index.html" class="back-link">← 診断一覧へ戻る</a>
    </div>`;
}

function renderReport(typeKey, t, names) {
  const axisOrder = ['熱量', '統率力', '打たれ強さ', '社交性'];
  const colors = ['#f97316', '#6366f1', '#16a34a', '#ec4899'];
  const axesHtml = axisOrder.map((label, i) => `
    <div class="axis-row">
      <span class="axis-label">${label}</span>
      <div class="axis-bar-wrap"><div class="axis-bar-fill" style="width:${t.bars[label]}%;background:${colors[i]};"></div></div>
      <span class="axis-value">${t.bars[label]}</span>
    </div>`).join('');

  const badgesHtml = QUIZZES.map(q => {
    const n = names[q.storage];
    return n ? `<span class="badge">${q.emoji} ${n}</span>` : '';
  }).join('');

  const strengthsHtml = t.strengths.map(s =>
    `<div class="strength-item"><span class="strength-name">${s.t}</span><span class="strength-desc">${s.d}</span></div>`).join('');

  const viewsHtml = [
    ['🏢 会社の人から見たあなた', t.views.company],
    ['🏠 家族から見たあなた', t.views.family],
    ['💖 恋愛で見せるあなた', t.views.love],
    ['🍻 友人から見たあなた', t.views.friend],
  ].map(([label, text]) => `<div class="view-item"><p class="view-label">${label}</p><p class="view-text">${text}</p></div>`).join('');

  const envHtml = t.env.map(e => `<span class="env-tag">${e}</span>`).join('');
  const shineHtml = t.shine.map((s, i) => `<div class="shine-item"><span class="shine-num">${i + 1}.</span><span>${s}</span></div>`).join('');

  const tweetText = encodeURIComponent(`【私の性格タイプ：${t.name}】\n4つの会社モンスター診断を統合分析した結果…\n"${t.catch}"\n\nあなたは16系統のどのタイプ？\n#会社モンスター診断 #性格分析`);
  const currentURL = encodeURIComponent(window.location.href);

  document.getElementById('app').innerHTML = `
    <div class="report-hero">
      <span class="label">🔮 統合分析レポート｜16系統</span>
      <h1>4つの診断からわかった、あなたの正体は…</h1>
      <p class="type-name">${t.name}</p>
      <p class="type-catch">${t.catch}</p>
      <div class="result-badges">${badgesHtml}</div>
    </div>

    <div class="axes-section">
      <p class="axes-title">◆ あなたの4つの性格エネルギー ◆</p>
      ${axesHtml}
    </div>

    <div class="section-card">
      <h2>🧭 あなたの本質</h2>
      <p>${t.essence}</p>
    </div>

    <div class="section-card">
      <h2>💪 あなたの強み</h2>
      ${strengthsHtml}
    </div>

    <div class="section-card">
      <h2>👁️ 周囲から見たあなた</h2>
      ${viewsHtml}
    </div>

    <div class="section-card talent-card">
      <h2>💎 実はあなたが気づいていない才能</h2>
      <p>${t.talent}</p>
    </div>

    <div class="section-card">
      <h2>🌱 向いている環境</h2>
      <div class="env-tags">${envHtml}</div>
      <p class="env-note">${t.envNote}</p>
    </div>

    <div class="section-card">
      <h2>🍵 ストレスを感じやすい状況</h2>
      <p>${t.stress}</p>
    </div>

    <div class="section-card">
      <h2>✨ あなたがさらに輝く方法</h2>
      ${shineHtml}
    </div>

    <div class="message-card">
      <h2>💌 最後に、あなたへ</h2>
      <p>${t.message}</p>
    </div>

    ${NOTE_URLS[typeKey] ? `
    <div class="premium-card">
      <h2>📕 この先の「実践編」を読みたい方へ</h2>
      <p class="premium-lead">ここまでが「あなたを知る」無料レポートです。<br>でも、本当に知りたいのはこの先ですよね。</p>
      <ul class="premium-list">
        <li>✔ あなたと最高に相性のいい上司・力を発揮しにくい上司は？</li>
        <li>✔ あなたの強みがそのまま活きる「具体的な職種」は？</li>
        <li>✔ このまま10年進んだ先に広がる、2つの未来シナリオ</li>
        <li>✔ 今日から始められる「30日アクションプラン」</li>
      </ul>
      <a href="${NOTE_URLS[typeKey]}" class="premium-btn" target="_blank" rel="noopener">▶ ${t.name}・完全版を読む（300円）</a>
      <p class="premium-note">『頑張りすぎる人のための人生攻略レポート』全16タイプ<br>note記事・スマホでそのまま読めます</p>
    </div>` : ''}

    <div class="share-section">
      <p class="share-lead">📣 この結果、誰かに見せたくなったら</p>
      <div class="share-btns">
        <a href="https://twitter.com/intent/tweet?text=${tweetText}&url=${currentURL}" class="share-btn twitter" target="_blank" rel="noopener">𝕏でシェア</a>
        <a href="https://social-plugins.line.me/lineit/share?url=${currentURL}" class="share-btn line" target="_blank" rel="noopener">🟢 LINEで送る</a>
      </div>
    </div>

    <div style="margin:16px 12px 8px;text-align:center;">
      <a href="index.html" style="font-size:.85em;color:#64748b;text-decoration:underline;">← 診断一覧へ戻る</a>
    </div>`;
}

(function () {
  let done = 0;
  QUIZZES.forEach(q => { if (localStorage.getItem(q.storage)) done++; });
  if (done < QUIZZES.length) {
    renderLockScreen(done, QUIZZES.length - done);
    return;
  }

  const typeKey = QUIZZES.map(q => axisLevel(q.axis, localStorage.getItem(q.storage))).join('');
  const t = window.REPORT_TYPES[typeKey];
  if (!t) {
    document.getElementById('app').innerHTML = '<div class="lock-screen"><p>データの読み込みに失敗しました。もう一度診断を受けてみてください。</p></div>';
    return;
  }

  const names = {};
  QUIZZES.forEach(q => { names[q.storage] = localStorage.getItem(q.storage + '_name') || ''; });

  renderReport(typeKey, t, names);
})();
</script>
</body>
</html>
